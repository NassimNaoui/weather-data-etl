services:

  # -----------------------
  # PostgreSQL
  # -----------------------
  postgres:
    image: postgres:14-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # -----------------------
  # dbt Core
  # -----------------------
  dbt:
    build: .
    container_name: dbt
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt_transformation
    volumes:
      - .:/usr/app
    ports:
      - "8080:8080"

volumes:
  postgres-data: