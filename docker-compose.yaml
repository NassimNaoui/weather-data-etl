services:

  # -----------------------
  # PostgreSQL
  # -----------------------
  postgres:
    image: postgres:14-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # -----------------------
  # dbt Core
  # -----------------------
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    platform: linux/amd64
    container_name: dbt
    depends_on:
      - postgres
    working_dir: /usr/app
    volumes:
      - ./dbt_project:/usr/app
    entrypoint: tail -f /dev/null  # garde le conteneur actif

volumes:
  postgres-data: