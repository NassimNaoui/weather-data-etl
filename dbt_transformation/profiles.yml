dbt_transformation: 
  outputs:
    # On garde une seule cible "default" qui s'adapte à l'environnement injecté par Docker
    default:
      type: postgres
      host: "{{ env_var('DB_HOST') }}"
      user: "{{ env_var('DB_USER') }}"
      password: "{{ env_var('DB_PASSWORD') }}"
      port: "{{ env_var('DB_PORT') | as_number }}"
      dbname: "{{ env_var('DB_NAME') }}"
      schema: "{{ env_var('DB_SCHEMA', 'public') }}"
      threads: 4
  target: default