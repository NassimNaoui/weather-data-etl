services:
  # L'application Python qui contient ton ETL/Script
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather_app_prod
    env_file:
      - .env.prod
    environment:
      - PYTHONPATH=/usr/app
    volumes:
      - .:/usr/app
      - /var/run/docker.sock:/var/run/docker.sock
      # MODIFICATION ICI : On utilise le volume nommé
      - /tmp/airbyte:/tmp/airbyte
    command: tail -f /dev/null

  # dbt pour les transformations
  dbt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbt_prod
    working_dir: /usr/app/dbt_transformation
    env_file:
      - .env.prod
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt_transformation
    volumes:
      - .:/usr/app
    command: ["dbt", "debug"]


volumes:
  airbyte_temp_data: